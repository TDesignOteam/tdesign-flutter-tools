name: PREVIEW_PUBLISH

on:
  workflow_run:
    workflows: ["PREVIEW_BUILD"]
    types:
      - completed

jobs:
  preview-success-web:
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Download PR number
        uses: actions/download-artifact@v4
        with:
          name: pr-number
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read PR number
        id: pr
        run: echo "number=$(cat pr-number.txt)" >> $GITHUB_OUTPUT

      - name: Download web artifact
        uses: actions/download-artifact@v4
        with:
          name: tdesign-flutter-web
          path: tdesign-flutter-web
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to surge
        id: deploy
        run: |
          repository=${{ github.repository }}
          project_name=${repository#*/}
          DEPLOY_DOMAIN=https://preview-pr-${{ steps.pr.outputs.number }}-$project_name.surge.sh
          npx surge --project ./tdesign-flutter-web --domain $DEPLOY_DOMAIN --token ${{ secrets.TDESIGN_SURGE_TOKEN }}
          echo "url=$DEPLOY_DOMAIN" >> $GITHUB_OUTPUT

      - name: Update PR comment
        uses: actions-cool/maintain-one-comment@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            <a href="${{ steps.deploy.outputs.url }}"><img height="96" alt="完成" src="https://user-images.githubusercontent.com/15634204/150816437-9f5bb788-cd67-4cbc-9897-b82d74e9aa65.png" /></a>

            **预览地址**: [${{ steps.deploy.outputs.url }}](${{ steps.deploy.outputs.url }})

            **组件文档（示例）**:
            - [Button 按钮](${{ steps.deploy.outputs.url }}/flutter/components/button)

            <!-- AUTO_PREVIEW_HOOK -->
          number: ${{ steps.pr.outputs.number }}
          body-include: "<!-- AUTO_PREVIEW_HOOK -->"

      - name: Mark failure on PR
        if: ${{ failure() }}
        uses: actions-cool/maintain-one-comment@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            [<img height="96" alt="失败" src="https://user-images.githubusercontent.com/5378891/75333447-1e63a280-58c1-11ea-975d-235367fd1522.png">](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
            <!-- AUTO_PREVIEW_HOOK -->
          number: ${{ steps.pr.outputs.number }}
          body-include: "<!-- AUTO_PREVIEW_HOOK -->"

  preview-failed:
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'failure'
    steps:
      - name: Download PR number
        uses: actions/download-artifact@v4
        with:
          name: pr-number
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read PR number
        id: pr
        run: echo "number=$(cat pr-number.txt)" >> $GITHUB_OUTPUT

      - name: Mark failure on PR
        uses: actions-cool/maintain-one-comment@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            [<img height="96" alt="失败" src="https://user-images.githubusercontent.com/5378891/75333447-1e63a280-58c1-11ea-975d-235367fd1522.png">](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
            <!-- AUTO_PREVIEW_HOOK -->
          number: ${{ steps.pr.outputs.number }}
          body-include: "<!-- AUTO_PREVIEW_HOOK -->"
