name: Test in TDesign Flutter

on:
  pull_request:
    branches: [main, rss1102/*]
  push:
    branches: [rss1102/*]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'

      - name: Checkout tdesign-flutter-tools
        uses: actions/checkout@v4

      - name: Install dependencies
        run: dart pub get

      - name: Build binary
        run: dart compile exe bin/main.dart -o tdesign_flutter_tools

      - name: Verify binary
        run: |
          git clone --depth 1 --branch develop https://github.com/Tencent/tdesign-flutter.git
          dart run .github/scripts/cross_platform_verify.dart tdesign-flutter tdesign_flutter_tools
